apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "securo.fullname" . }}-migration
  labels:
    {{- include "securo.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "securo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Starting database migration..."
              for i in $(seq 1 30); do
                if alembic upgrade head; then
                  echo "Migration successful."
                  exit 0
                fi
                echo "Migration failed (database might not be ready). Retrying in 5 seconds..."
                sleep 5
              done
              echo "Migration failed after multiple retries."
              exit 1
          envFrom:
            - configMapRef:
                name: {{ include "securo.fullname" . }}-config
            - secretRef:
                {{- if .Values.global.existingSecret }}
                name: {{ .Values.global.existingSecret }}
                {{- else }}
                name: {{ include "securo.fullname" . }}-secrets
                {{- end }}
          {{- if .Values.backend.resources }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- end }}
