apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "securo.fullname" . }}-backend
  labels:
    {{- include "securo.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "securo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/common/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "securo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command:
            - uvicorn
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: {{ include "securo.fullname" . }}-config
            - secretRef:
                {{- if .Values.global.existingSecret }}
                name: {{ .Values.global.existingSecret }}
                {{- else }}
                name: {{ include "securo.fullname" . }}-secrets
                {{- end }}
          volumeMounts:
            {{- if .Values.persistence.attachments.enabled }}
            - name: attachments
              mountPath: /app/data/attachments
            {{- end }}
            {{- if and (eq (.Values.config.agentsEnabled | toString) "true") .Values.persistence.agentKnowledge.enabled }}
            - name: agent-knowledge
              mountPath: /app/data/agent_knowledge
            {{- end }}
            {{- if and (eq (.Values.config.agentsEnabled | toString) "true") .Values.persistence.agentEmbeddingModels.enabled }}
            - name: agent-embedding-models
              mountPath: /app/data/embedding_models
            {{- end }}
          {{- if .Values.backend.resources }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.persistence.attachments.enabled }}
        - name: attachments
          persistentVolumeClaim:
            claimName: {{ include "securo.fullname" . }}-attachments
        {{- end }}
        {{- if and (eq (.Values.config.agentsEnabled | toString) "true") .Values.persistence.agentKnowledge.enabled }}
        - name: agent-knowledge
          persistentVolumeClaim:
            claimName: {{ include "securo.fullname" . }}-agent-knowledge
        {{- end }}
        {{- if and (eq (.Values.config.agentsEnabled | toString) "true") .Values.persistence.agentEmbeddingModels.enabled }}
        - name: agent-embedding-models
          persistentVolumeClaim:
            claimName: {{ include "securo.fullname" . }}-agent-embedding-models
        {{- end }}
