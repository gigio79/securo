apiVersion: v1
kind: Service
metadata:
  name: {{ include "securo.fullname" . }}-frontend
  labels:
    {{- include "securo.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      {{- if .Values.frontend.service.nodePort }}
      nodePort: {{ .Values.frontend.service.nodePort }}
      {{- end }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "securo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
