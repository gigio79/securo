{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "securo.fullname" . }}
  labels:
    {{- include "securo.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  hostnames:
    - {{ .Values.global.domain | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "securo.fullname" . }}-frontend
          port: {{ .Values.frontend.service.port }}
    {{- if .Values.mcpServer.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: {{ include "securo.fullname" . }}-mcp-server
          port: {{ .Values.mcpServer.service.port }}
    {{- end }}
{{- end }}
